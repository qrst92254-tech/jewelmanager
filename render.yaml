services:
  - type: web
    name: jewelmanager-pro
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_DB_PATH
        value: /var/data/jewel-shop.db
    disk:
      name: jewelshop-data
      mountPath: /var/data
      sizeGB: 1
